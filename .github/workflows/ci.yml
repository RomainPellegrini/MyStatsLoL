name: CI 
 
on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'
      
jobs:
  unit-tests:
    name: Tests unitaires
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
 
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Lancer mvn test
        working-directory: ./backend
        run: mvn test --no-transfer-progress
        
  integration-tests:
    name: Tests Integration
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
 
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
 
      - name: Lancer mvn verify
        working-directory: ./backend
        run: mvn verify --no-transfer-progress
  e2e-tests:
    name: Test E2E
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
 
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./Front-MyStatsLol-Angular/package-lock.json
 
      - name: Installer les dépendances npm
        working-directory: ./Front-MyStatsLol-Angular
        run: npm ci
 
      - name: Installer les navigateurs Playwright
        working-directory: ./Front-MyStatsLol-Angular
        run: npx playwright install --with-deps
 
      - name: Setup Java 21 (pour le backend)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
 
      - name: Démarrer le backend en arrière-plan
        working-directory: ./backend
        run: mvn spring-boot:run --no-transfer-progress 2>&1 | tee /tmp/backend.log &

      - name: Attendre que le backend soit prêt
        run: |
          echo "En attente du backend..."
          for i in {1..60}; do
            if curl -s http://localhost:8080/actuator/health | grep UP; then
              echo "Backend is ready!"
              exit 0
            fi
            echo "Tentative $i/60..."
            tail -100 /tmp/backend.log 2>/dev/null || true
            sleep 5
          done
          echo "Backend non démarré après 300s"
          cat /tmp/backend.log
          exit 1
      - name: ask Back end
        working-directory: ./Front-MyStatsLol-Angular
        run: curl http://localhost:8080/players/playerByPuuid/fawulsCpzlkgkfMcs1FW2JKvhE9HR1OnTmv8nsztXLQdtnrYWdJS1Y_Q9AnH8q6RSyJZhF71EZczXA

      - name: Lancer les tests Playwright
        working-directory: ./Front-MyStatsLol-Angular
        run: npx playwright test
 
      - name: Upload du rapport Playwright
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: ./Front-MyStatsLol-Angular/playwright-report/
          retention-days: 7
 
 