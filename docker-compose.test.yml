services:
  db-test:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${TEST_POSTGRES_DB}
      POSTGRES_USER: ${TEST_POSTGRES_USER}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./BddTest:/docker-entrypoint-initdb.d
    tmpfs:
      - /var/lib/postgresql